name: Build release binaries for all platforms

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: linux-x86_64,   host: x86_64-linux-gnu,       pkgs: "g++-x86-64-linux-gnu",                bin: vsearch,     out: vsearch-linux-x86_64 }
          - { name: windows-x86_64, host: x86_64-w64-mingw32,     pkgs: "mingw-w64 libz-mingw-w64-dev",        bin: vsearch.exe, out: vsearch-win-x86_64.exe }
          - { name: linux-aarch64,  host: aarch64-linux-gnu,      pkgs: "g++-aarch64-linux-gnu libsimde-dev",  bin: vsearch,     out: vsearch-linux-aarch64 }
          - { name: linux-mips64el, host: mips64el-linux-gnuabi64, pkgs: "g++-mips64el-linux-gnuabi64 libsimde-dev", bin: vsearch, out: vsearch-linux-mips64el }
          - { name: linux-ppc64le,  host: powerpc64le-linux-gnu,  pkgs: "g++-powerpc64le-linux-gnu libsimde-dev", bin: vsearch, out: vsearch-linux-ppc64le }
          - { name: linux-riscv64,  host: riscv64-linux-gnu,      pkgs: "g++-riscv64-linux-gnu libsimde-dev",  bin: vsearch,     out: vsearch-linux-riscv64 }

    name: ${{ matrix.target.name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ghostscript groff libbz2-dev zlib1g-dev ${{ matrix.target.pkgs }}

    - name: Configure and build for ${{ matrix.target.name }}
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2" --host=${{ matrix.target.host }}
        make clean
        make ARFLAGS="cr" -j$(nproc)
        mv bin/${{ matrix.target.bin }} bin/${{ matrix.target.out }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.target.out }}
        path: bin/${{ matrix.target.out }}


  macos:
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: macos-aarch64, runner: macos-latest,    out: vsearch-macos-aarch64 }
          - { name: macos-x86_64,  runner: macos-15-intel,  out: vsearch-macos-x86_64 }

    runs-on: ${{ matrix.target.runner }}
    name: ${{ matrix.target.name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        # aws/tap and azure/bicep are pre-tapped on the GitHub macOS runner
        # images and trigger Homebrew tap-trust warnings; we use nothing from
        # them, so remove them before updating/installing. azure/bicep ships an
        # installed formula (bicep): uninstall it first so the tap untaps
        # cleanly without --force (which would itself print a warning). Each
        # step is guarded so it stays quiet and non-fatal on a future image
        # that no longer has these taps/formulae. We do NOT silence stderr of
        # the actual operations: hiding it is what masked the earlier failure.
        brew list bicep >/dev/null 2>&1 && brew uninstall bicep
        for tap in aws/tap azure/bicep; do
          brew tap | grep -qx "$tap" && brew untap "$tap"
        done
        brew update
        brew install autoconf automake ghostscript groff

    - name: Configure and build for ${{ matrix.target.name }}
      run: |
        ./autogen.sh
        ./configure CFLAGS="-O2" CXXFLAGS="-O2"
        make clean
        make ARFLAGS="cr" -j$(sysctl -n hw.ncpu)
        mv bin/vsearch bin/${{ matrix.target.out }}
        bin/${{ matrix.target.out }} -v

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.target.out }}
        path: bin/${{ matrix.target.out }}
